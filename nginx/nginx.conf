# ==============================================================================
# nginx/nginx.conf — 外层 Nginx 反向代理配置（统一入口）
#
# 架构职责：
#   - 对外唯一暴露端口（:3080），用户只与此 Nginx 交互
#   - /api/v1/*  → 转发到 backend:8000（FastAPI）
#   - /*         → 转发到 frontend:80（React 静态文件）
#   - 特殊处理 SSE 流式响应（禁用缓冲）
# ==============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream: $upstream_addr '
                    'resp_time: $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;
    client_header_timeout 30s;
    client_body_timeout   60s;
    send_timeout          60s;

    client_max_body_size 60m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml;

    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Docker 内部 DNS 解析器，使 upstream 地址可以在运行时动态解析
        # 避免 nginx 启动时因 backend/frontend 容器尚未就绪而 DNS 解析失败崩溃
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ===========================================================
        # /api/v1/chat/stream → SSE 流式响应（优先匹配）
        # ===========================================================
        location /api/v1/chat/stream {
            set $backend_url http://backend:8000;
            proxy_pass         $backend_url;
            proxy_http_version 1.1;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        # ===========================================================
        # /api/ → FastAPI 后端
        # ===========================================================
        location /api/ {
            set $backend_url http://backend:8000;
            proxy_pass         $backend_url;
            proxy_http_version 1.1;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;

            proxy_buffering            off;
            proxy_cache                off;
            proxy_set_header           Accept-Encoding "";
        }

        # ===========================================================
        # / → React 前端
        # ===========================================================
        location / {
            set $frontend_url http://frontend:80;
            proxy_pass         $frontend_url;
            proxy_http_version 1.1;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ===========================================================
        # 健康检查端点
        # ===========================================================
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        add_header X-Frame-Options        "SAMEORIGIN"         always;
        add_header X-Content-Type-Options "nosniff"            always;
        add_header Referrer-Policy        "strict-origin"      always;
    }
}
