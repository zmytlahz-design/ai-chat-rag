# ==============================================================================
# frontend/nginx.conf — 前端容器内部 Nginx 配置（SPA 静态文件服务）
#
# 职责：
#   仅负责托管 React 构建产物（/usr/share/nginx/html），
#   并处理 SPA（Single Page Application）路由回退。
#
# 注意：
#   此配置不处理 /api 请求，/api 由外层 nginx 反代直接转发到 backend。
# ==============================================================================

server {
    listen 80;
    server_name _;           # 匹配所有域名

    # 静态文件根目录（Dockerfile 中 COPY 构建产物到此路径）
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip 压缩 ---
    # 对 JS/CSS/HTML/JSON 等文本资源启用 gzip，减少传输体积约 60-70%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;           # 压缩级别（1-9，6 为速度/压缩率平衡点）
    gzip_min_length 1024;        # 小于 1KB 的响应不压缩（压缩本身有开销）
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- 静态资源强缓存 ---
    # Vite 构建的 JS/CSS 文件名包含 hash（如 index-DUDCnAY9.js），
    # 内容不变则 hash 不变，可以放心设置 1 年强缓存。
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 文件不存在时返回 404（静态资源应该始终存在）
        try_files $uri =404;
    }

    # --- SPA 路由回退 ---
    # React Router 使用 HTML5 History API，直接访问 /knowledge-base 等路径时
    # 服务器没有对应文件，需要返回 index.html 让前端路由接管。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- 安全响应头 ---
    add_header X-Frame-Options       "SAMEORIGIN"   always;  # 防止 Clickjacking
    add_header X-Content-Type-Options "nosniff"     always;  # 防止 MIME 嗅探
    add_header Referrer-Policy       "strict-origin" always;

    # --- 隐藏 Nginx 版本号 ---
    server_tokens off;
}
